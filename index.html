<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COSMOS — Odisseia pelo Universo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00f5ff; --gold:#ffcc44; --red:#ff3311;
  --purple:#aa44ff; --green:#44ffaa; --white:#e8f4ff;
  --void:#000008;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);}
canvas#c{position:fixed;inset:0;z-index:1;display:block;}

/* ===== ROTATE ===== */
#rot{
  position:fixed;inset:0;z-index:9999;background:var(--void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
  transition:opacity 0.8s;
}
#rot.gone{opacity:0;pointer-events:none;}
.ph{
  width:52px;height:82px;border:2.5px solid var(--cyan);border-radius:12px;
  position:relative;box-shadow:0 0 30px rgba(0,245,255,.35),inset 0 0 12px rgba(0,245,255,.06);
  animation:rph 2.5s ease-in-out infinite;
}
.ph:before{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:13px;height:13px;border-radius:50%;border:2px solid var(--cyan);}
.ph:after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:18px;height:3px;background:var(--cyan);border-radius:2px;}
@keyframes rph{0%,35%{transform:rotate(0)}65%,100%{transform:rotate(-90deg)}}
.rt{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:5px;color:var(--cyan);
  text-transform:uppercase;animation:glow 2s ease infinite;}
.rs{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;
  color:rgba(232,244,255,.35);text-align:center;line-height:1.7;}
@keyframes glow{0%,100%{opacity:.5;text-shadow:none}50%{opacity:1;text-shadow:0 0 20px var(--cyan)}}

/* ===== UI ===== */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;font-family:'Space Mono',monospace;}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;height:64px;
  background:linear-gradient(180deg,rgba(0,0,8,.85) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;
}
#logo{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(15px,2.8vw,24px);letter-spacing:8px;
  background:linear-gradient(90deg,#fff 30%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(0,245,255,.4));
}
#hud-right{
  text-align:right;font-size:9px;letter-spacing:2px;
  color:rgba(0,245,255,.5);line-height:2;
}
#hud-right span{color:var(--cyan);}

/* Progress track */
#track{
  position:absolute;top:50%;right:18px;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:7px;align-items:center;
  pointer-events:auto;
}
.tdot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1px solid rgba(0,245,255,.2);
  cursor:pointer;transition:all .4s;
  position:relative;
}
.tdot:hover{background:rgba(0,245,255,.3);}
.tdot.act{background:var(--cyan);box-shadow:0 0 10px var(--cyan);height:18px;border-radius:3px;}
.tdot .tip{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:rgba(0,0,15,.9);border:1px solid rgba(0,245,255,.2);
  color:var(--cyan);font-size:8px;letter-spacing:2px;
  padding:3px 8px;border-radius:2px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.tdot:hover .tip{opacity:1;}

/* Info Panel */
#panel{
  position:absolute;bottom:90px;left:22px;
  max-width:min(360px,44vw);
  transition:opacity .6s,transform .6s;
  pointer-events:auto;
}
#panel.off{opacity:0;transform:translateY(24px);}
#p-cat{
  font-size:8px;letter-spacing:4px;color:rgba(0,245,255,.45);
  text-transform:uppercase;margin-bottom:5px;
  display:flex;align-items:center;gap:8px;
}
#p-cat:before{content:'';display:block;width:20px;height:1px;background:rgba(0,245,255,.3);}
#p-name{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(20px,4vw,38px);line-height:1;
  margin-bottom:10px;letter-spacing:2px;
}
#p-desc{
  font-size:clamp(9px,1.4vw,12px);line-height:1.9;
  color:rgba(232,244,255,.55);letter-spacing:.4px;margin-bottom:14px;
}
#p-stats{display:flex;gap:18px;flex-wrap:wrap;}
.ps{border-left:2px solid;padding-left:10px;}
.psv{font-family:'Orbitron',monospace;font-size:clamp(11px,1.8vw,15px);}
.psl{font-size:7px;letter-spacing:2px;color:rgba(232,244,255,.3);text-transform:uppercase;margin-top:2px;}

/* Nav */
#nav{
  position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:16px;
  pointer-events:auto;
}
.nb{
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.2);
  color:var(--cyan);font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .25s;backdrop-filter:blur(8px);
  font-family:'Orbitron',monospace;
}
.nb:hover,.nb:active{background:rgba(0,245,255,.15);box-shadow:0 0 20px rgba(0,245,255,.25);}
.nb:disabled{opacity:.18;cursor:default;pointer-events:none;}
#dest-counter{
  font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;
  color:rgba(232,244,255,.4);min-width:60px;text-align:center;
}

/* Warp */
#warp{
  position:fixed;inset:0;z-index:8;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.95) 0%,rgba(120,200,255,.4) 30%,transparent 65%);
  opacity:0;transition:opacity .12s;
}
#warp.on{opacity:1;}

/* Speed lines */
#speedlines{
  position:fixed;inset:0;z-index:7;pointer-events:none;opacity:0;
  transition:opacity .3s;overflow:hidden;
}
#speedlines.on{opacity:1;}
.sl{
  position:absolute;background:linear-gradient(90deg,transparent,rgba(0,245,255,.6),transparent);
  height:1px;transform-origin:left center;
  animation:slzoom .4s linear forwards;
}
@keyframes slzoom{from{transform:scaleX(0);opacity:1}to{transform:scaleX(3);opacity:0}}

/* Scanlines */
#scan{
  position:fixed;inset:0;z-index:6;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);
}

/* Ambient label */
#ambient{
  position:absolute;top:72px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:5px;color:rgba(255,255,255,.15);
  text-transform:uppercase;font-family:'Orbitron',monospace;
  animation:amb 4s ease infinite;
  white-space:nowrap;
}
@keyframes amb{0%,100%{opacity:.1}50%{opacity:.35}}

/* Hint */
#hint{
  position:absolute;bottom:76px;right:22px;
  font-size:8px;letter-spacing:3px;color:rgba(0,245,255,.3);
  text-transform:uppercase;display:flex;align-items:center;gap:6px;
  animation:glow 3s ease infinite;
}
</style>
</head>
<body>

<div id="rot">
  <div class="ph"></div>
  <div class="rt">Gire sua tela</div>
  <div class="rs">Modo paisagem obrigatório<br>para uma experiência imersiva completa</div>
</div>

<canvas id="c"></canvas>
<div id="warp"></div>
<div id="speedlines"></div>
<div id="scan"></div>

<div id="ui">
  <div id="hud">
    <div id="logo">COSMOS</div>
    <div id="hud-right">
      VEL <span id="spd">0</span> km/s &nbsp;|&nbsp; DEST <span id="di">01</span>/<span id="dt">22</span><br>
      SIS <span id="sys-name">SOL</span> &nbsp;|&nbsp; COORD <span id="coord">0.00, 0.00</span>
    </div>
  </div>
  <div id="ambient" id="amb-txt">SISTEMA SOLAR • VIA LÁCTEA • UNIVERSO OBSERVÁVEL</div>

  <div id="track"></div>

  <div id="panel" class="off">
    <div id="p-cat">DESTINO ATUAL</div>
    <div id="p-name">—</div>
    <div id="p-desc">—</div>
    <div id="p-stats"></div>
  </div>

  <div id="hint">Deslize para viajar ›</div>


  <div id="nav">
    <button class="nb" id="bp" onclick="nav(-1)">‹</button>
    <div id="dest-counter">01 / 22</div>
    <button class="nb" id="bn" onclick="nav(1)">›</button>
  </div>
</div>

<script>
/* ======================================================
   COSMOS 3D — ODISSEIA PELO UNIVERSO
   22 Destinos | GLSL Shaders | Procedural Textures
   Advanced Particle Systems | Volumetric Atmosphere
====================================================== */

// ── ORIENTATION ──────────────────────────────────────
const ROT = document.getElementById('rot');
function chkOri(){
  const landscape = window.innerWidth > window.innerHeight;
  ROT.classList.toggle('gone', landscape);
}

// Toca no primeiro toque/clique do usuário — garante que funciona mesmo com bloqueio de autoplay
chkOri(); window.addEventListener('resize', chkOri);
window.addEventListener('orientationchange', () => setTimeout(chkOri, 300));

// ── THREE SETUP ───────────────────────────────────────
const canvas = document.getElementById('c');
const R = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
R.setPixelRatio(Math.min(devicePixelRatio,2.5));
R.setSize(innerWidth,innerHeight);
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.1;
R.shadowMap.enabled = true;

const S = new THREE.Scene();
const CAM = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 100000);
CAM.position.set(0, 0.5, 9);

window.addEventListener('resize',()=>{
  CAM.aspect = innerWidth/innerHeight;
  CAM.updateProjectionMatrix();
  R.setSize(innerWidth,innerHeight);
});

// ── NOISE & MATH ──────────────────────────────────────
const H = (n)=> Math.sin(n*127.1+311.7)*43758.5453 % 1;
const H2 = (x,y)=> H(x+y*57.3);
const lerp = (a,b,t)=> a+(b-a)*t;
const smoothstep = (t)=> t*t*(3-2*t);
function fbm(x,y,oct=5){
  let v=0,a=0.5,f=1;
  for(let i=0;i<oct;i++){
    const ix=Math.floor(x*f),iy=Math.floor(y*f);
    const fx=(x*f-ix),fy=(y*f-iy);
    const ux=smoothstep(fx),uy=smoothstep(fy);
    v+=a*(lerp(lerp(H2(ix,iy),H2(ix+1,iy),ux),lerp(H2(ix,iy+1),H2(ix+1,iy+1),ux),uy));
    a*=0.5; f*=2;
  }
  return v;
}

// ── TEXTURE FACTORY ───────────────────────────────────
function mkTex(w,h,fn){
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d'); fn(ctx,w,h);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function mkTexHD(w,h,fn){ return mkTex(w,h,fn); }

// ── PLANET SHADER MATERIAL ────────────────────────────
// Custom ShaderMaterial for better lighting + atmosphere
const planetVert = `
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main(){
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
  }
`;
const planetFrag = `
  uniform sampler2D tDiff;
  uniform vec3 uLightPos;
  uniform vec3 uLightColor;
  uniform float uAmbient;
  uniform vec3 uSpecColor;
  uniform float uSpecPow;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main(){
    vec4 col = texture2D(tDiff, vUv);
    vec3 L = normalize(uLightPos - vWorldPos);
    float diff = max(dot(vNormal, L), 0.0);
    vec3 V = normalize(cameraPosition - vWorldPos);
    vec3 H = normalize(L+V);
    float spec = pow(max(dot(vNormal,H),0.0), uSpecPow);
    vec3 ambient = col.rgb * uAmbient;
    vec3 diffuse = col.rgb * diff * uLightColor;
    vec3 specular = uSpecColor * spec * 0.3;
    gl_FragColor = vec4(ambient + diffuse + specular, col.a);
  }
`;

const atmVert = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    vNormal = normalize(normalMatrix * normal);
    vec4 wp = modelViewMatrix * vec4(position,1.0);
    vViewDir = normalize(-wp.xyz);
    gl_Position = projectionMatrix * wp;
  }
`;
const atmFrag = `
  uniform vec3 uColor;
  uniform float uIntensity;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    float rim = 1.0 - max(dot(vNormal, vViewDir), 0.0);
    rim = pow(rim, 2.5);
    gl_FragColor = vec4(uColor, rim * uIntensity);
  }
`;

const sunVert = `
  varying vec2 vUv;
  varying vec3 vNormal;
  uniform float uTime;
  void main(){
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vec3 p = position;
    // subtle surface displacement
    float d = sin(p.x*8.0+uTime)*cos(p.y*6.0+uTime*0.7)*0.012;
    p += normal*d;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(p,1.0);
  }
`;
const sunFrag = `
  uniform sampler2D tDiff;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vNormal;
  void main(){
    vec2 uv2 = vUv + vec2(uTime*0.01, uTime*0.005);
    vec4 col = texture2D(tDiff, uv2);
    // limb darkening
    float limb = pow(max(dot(vNormal, vec3(0.0,0.0,1.0)),0.0),0.3);
    col.rgb *= mix(0.6, 1.0, limb);
    // corona glow
    float rim = 1.0 - max(dot(normalize(vNormal), vec3(0,0,1)),0.0);
    col.rgb += vec3(1.0,0.6,0.1)*pow(rim,3.0)*0.8;
    gl_FragColor = col;
  }
`;

const gasVert = `
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  uniform float uTime;
  void main(){
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vec4 wp = modelViewMatrix * vec4(position,1.0);
    vViewDir = normalize(-wp.xyz);
    gl_Position = projectionMatrix * wp;
  }
`;
const gasFrag = `
  uniform sampler2D tDiff;
  uniform float uTime;
  uniform vec3 uLightPos;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    vec2 uv2 = vec2(vUv.x + uTime*0.003, vUv.y);
    vec4 col = texture2D(tDiff, uv2);
    vec3 L = normalize(uLightPos);
    float diff = max(dot(vNormal, L), 0.0)*0.8+0.2;
    // limb darkening
    float rim = 1.0 - max(dot(vNormal, vViewDir), 0.0);
    col.rgb *= diff;
    col.rgb = mix(col.rgb, col.rgb*0.4, pow(rim,4.0)*0.5);
    gl_FragColor = col;
  }
`;

const bhFrag = `
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main(){
    float r = length(vUv - 0.5)*2.0;
    float angle = atan(vUv.y-0.5, vUv.x-0.5);
    // accretion disk coloring in fragment
    float d = 1.0 - smoothstep(0.0, 0.6, r);
    vec3 inner = vec3(1.0,0.8,0.4)*2.0;
    vec3 outer = vec3(0.4,0.0,0.8);
    vec3 col = mix(outer, inner, d*d);
    float rim = 1.0 - max(dot(vNormal, vViewDir),0.0);
    col += vec3(0.3,0.0,0.6)*pow(rim,2.0);
    // dark center
    col *= 1.0 - smoothstep(0.0,0.25,r)*smoothstep(0.25,0.0,r+0.0);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// ── TEXTURE GENERATORS ────────────────────────────────
const TEXTURES = {
  earth: ()=>mkTexHD(1024,512,(ctx,w,h)=>{
    // Deep ocean
    const grd=ctx.createLinearGradient(0,0,w,h);
    grd.addColorStop(0,'#0d2b52');grd.addColorStop(.5,'#1a4a7a');grd.addColorStop(1,'#0e2f5a');
    ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
    // Continents procedurally
    ctx.fillStyle='#2d6e30';
    const continents=[
      [0.12,0.35,120,80],[0.35,0.3,100,70],[0.38,0.4,80,60],[0.55,0.4,90,65],
      [0.6,0.55,70,50],[0.7,0.4,60,45],[0.08,0.55,90,60],[0.22,0.6,70,40],
      [0.8,0.35,80,55],[0.9,0.5,60,40]
    ];
    continents.forEach(([nx,ny,rx,ry])=>{
      for(let i=0;i<8;i++){
        const x=(nx+Math.sin(i)*0.06)*w, y=(ny+Math.cos(i)*0.04)*h;
        const r=rx*(0.7+fbm(nx*3+i,ny*3+i)*0.6);
        const r2=ry*(0.7+fbm(nx*3+i+1,ny*3+i+1)*0.5);
        ctx.beginPath();ctx.ellipse(x,y,r,r2,fbm(i,ny)*Math.PI,0,Math.PI*2);
        const g2=Math.floor(80+fbm(nx*5+i,ny*5)*40);
        ctx.fillStyle=`rgb(${40+g2*.4},${g2+20},${30+g2*.3})`;ctx.fill();
      }
    });
    // Mountains / highlands
    ctx.fillStyle='rgba(100,85,60,0.4)';
    for(let i=0;i<20;i++){
      const x=Math.random()*w,y=Math.random()*h;
      ctx.beginPath();ctx.ellipse(x,y,20+Math.random()*50,10+Math.random()*25,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();
    }
    // Ice caps
    const iceGrd=ctx.createLinearGradient(0,0,0,h*0.1);
    iceGrd.addColorStop(0,'rgba(240,248,255,.95)');iceGrd.addColorStop(1,'rgba(240,248,255,0)');
    ctx.fillStyle=iceGrd;ctx.fillRect(0,0,w,h*0.1);
    const iceGrd2=ctx.createLinearGradient(0,h*.9,0,h);
    iceGrd2.addColorStop(0,'rgba(240,248,255,0)');iceGrd2.addColorStop(1,'rgba(240,248,255,.9)');
    ctx.fillStyle=iceGrd2;ctx.fillRect(0,h*.9,w,h*.1);
    // City lights feel (subtle)
    ctx.fillStyle='rgba(255,230,100,0.08)';
    for(let i=0;i<60;i++){ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,1+Math.random()*2,0,Math.PI*2);ctx.fill();}
  }),

  earthClouds: ()=>mkTexHD(1024,512,(ctx,w,h)=>{
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='rgba(255,255,255,0)';ctx.fillRect(0,0,w,h);
    for(let i=0;i<50;i++){
      const x=Math.random()*w,y=Math.random()*h;
      const grd=ctx.createRadialGradient(x,y,0,x,y,40+Math.random()*80);
      grd.addColorStop(0,'rgba(255,255,255,0.55)');
      grd.addColorStop(0.5,'rgba(255,255,255,0.2)');
      grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.ellipse(x,y,60+Math.random()*100,15+Math.random()*30,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();
    }
  }),

  moon: ()=>mkTexHD(512,256,(ctx,w,h)=>{
    // Base regolith
    const id=ctx.createImageData(w,h);
    for(let i=0;i<w*h;i++){
      const n=fbm(i%w*.008,Math.floor(i/w)*.016,6);
      const v=Math.floor(100+n*80);
      id.data[i*4]=v;id.data[i*4+1]=v-2;id.data[i*4+2]=v-5;id.data[i*4+3]=255;
    }
    ctx.putImageData(id,0,0);
    // Craters
    const craterColors=['rgba(60,57,54,0.7)','rgba(40,38,35,0.6)','rgba(80,76,72,0.5)'];
    for(let i=0;i<100;i++){
      const x=Math.random()*w,y=Math.random()*h,r=2+Math.random()*30;
      // Rim highlight
      ctx.strokeStyle=`rgba(170,165,158,${0.3+Math.random()*.3})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
      // Dark floor
      ctx.fillStyle=craterColors[Math.floor(Math.random()*craterColors.length)];
      ctx.beginPath();ctx.arc(x,y,r*.8,0,Math.PI*2);ctx.fill();
    }
  }),

  mars: ()=>mkTexHD(1024,512,(ctx,w,h)=>{
    const id=ctx.createImageData(w,h);
    for(let i=0;i<w*h;i++){
      const px=i%w,py=Math.floor(i/w);
      const n=fbm(px*.005,py*.008,7);
      const n2=fbm(px*.02+5,py*.018+3,4);
      const r=Math.floor(165+n*60+n2*20);
      const g=Math.floor(45+n*25+n2*8);
      const b=Math.floor(15+n*10);
      id.data[i*4]=Math.min(255,r);id.data[i*4+1]=Math.min(120,g);id.data[i*4+2]=Math.min(50,b);id.data[i*4+3]=255;
    }

// ── BUILD FUNCTIONS ───────────────────────────────────
let lightPos = new THREE.Vector3(50, 20, 30);
let uTime = 0;
const shaderUniforms = [];

function mkPlanetMat(tex, specColor='#ffffff', specPow=30){
  return new THREE.ShaderMaterial({
    uniforms:{
      tDiff:{value:tex},
      uLightPos:{value:lightPos},
      uLightColor:{value:new THREE.Color('#fff8ee')},
      uAmbient:{value:0.08},
      uSpecColor:{value:new THREE.Color(specColor)},
      uSpecPow:{value:specPow},
    },
    vertexShader:planetVert, fragmentShader:planetFrag
  });
}

function mkAtmosphere(r, col, intensity, scale=1.08){
  const geo=new THREE.SphereGeometry(r*scale,48,24);
  const mat=new THREE.ShaderMaterial({
    uniforms:{uColor:{value:new THREE.Color(col)},uIntensity:{value:intensity}},
    vertexShader:atmVert, fragmentShader:atmFrag,
    transparent:true, side:THREE.BackSide, depthWrite:false
  });
  return new THREE.Mesh(geo,mat);
}

function mkCloudLayer(r, opacity=0.55){
  const tex=TEXTURES.earthClouds();
  const geo=new THREE.SphereGeometry(r*1.018,64,32);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity,side:THREE.FrontSide,depthWrite:false});
  return new THREE.Mesh(geo,mat);
}

function mkRing(inner, outer, tex, rot={x:0,y:0,z:0}){
  const geo=new THREE.RingGeometry(inner,outer,128,4);
  // Remap UVs so U goes from 0 (inner) to 1 (outer) based on radius
  const pos=geo.attributes.position;
  const uv=geo.attributes.uv;
  const tmpV=new THREE.Vector3();
  for(let i=0;i<pos.count;i++){
    tmpV.fromBufferAttribute(pos,i);
    const r=tmpV.length();
    uv.setXY(i,(r-inner)/(outer-inner), Math.atan2(tmpV.y,tmpV.x)/(Math.PI*2)+0.5);
  }
  uv.needsUpdate=true;
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false,alphaTest:0.01});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.rotation.x=rot.x; mesh.rotation.y=rot.y; mesh.rotation.z=rot.z;
  mesh.userData.isSaturnRing=true; // tag to skip animation
  return mesh;
}

function buildSaturnRings(group, r){
  // Single wide ring texture - radial gradient from inner to outer
  const ringData=[
    {ir:r*1.22, or:r*1.52, col:'rgba(210,185,125,0.82)', col2:'rgba(190,160,100,0.75)'},
    {ir:r*1.54, or:r*1.78, col:'rgba(180,155,90,0.65)',  col2:'rgba(160,130,70,0.55)'},
    {ir:r*1.80, or:r*2.10, col:'rgba(215,195,135,0.72)', col2:'rgba(195,170,110,0.65)'},
    {ir:r*2.12, or:r*2.32, col:'rgba(165,138,80,0.52)',  col2:'rgba(145,118,60,0.45)'},
    {ir:r*2.34, or:r*2.50, col:'rgba(200,175,105,0.42)', col2:'rgba(180,155,85,0.35)'},
  ];
  ringData.forEach(({ir,or,col,col2},idx)=>{
    // Create a radial texture: wide (512) x tall (128), U = radial, V = angular
    const tex=mkTex(512,128,(ctx,w,h)=>{
      // Base gradient radially (left=inner edge, right=outer edge)
      const g=ctx.createLinearGradient(0,0,w,0);
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(0.08,col);
      g.addColorStop(0.35,col2);
      g.addColorStop(0.65,col);
      g.addColorStop(0.92,col2);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      // Subtle radial stripes (Cassini division etc.)
      if(idx===2){
        // Cassini division - dark gap
        ctx.fillStyle='rgba(0,0,0,0.55)';
        ctx.fillRect(w*0.42,0,w*0.08,h);
      }
      // Fine ring texture variation
      for(let i=0;i<30;i++){
        const x=Math.random()*w;
        ctx.fillStyle=Math.random()>.5?'rgba(255,240,180,0.08)':'rgba(0,0,0,0.06)';
        ctx.fillRect(x,0,1+Math.random()*3,h);
      }
    });
    const ring=mkRing(ir,or,tex,{x:-Math.PI/2.4, y:0, z:0});
    group.add(ring);
  });
}

function buildUranusRings(group, r){
  for(let i=0;i<13;i++){
    const ir=r*1.38+i*0.13, or=ir+0.055;
    const tex=mkTex(128,4,(ctx,w,h)=>{
      const g=ctx.createLinearGradient(0,0,w,0);
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(0.15,`rgba(${50+i*3},${60+i*3},${90+i*2},0.65)`);
      g.addColorStop(0.85,`rgba(${55+i*3},${65+i*3},${95+i*2},0.65)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    });
    const ring=mkRing(ir,or,tex,{x:-Math.PI/2.05});
    ring.userData.isUranusRing=true;
    group.add(ring);
  }
}

function buildAsteroid(group){
  // Irregular shape
  const geo=new THREE.IcosahedronGeometry(.45,2);
  const pos2=geo.attributes.position;
  for(let i=0;i<pos2.count;i++){
    const v=new THREE.Vector3().fromBufferAttribute(pos2,i);
    v.normalize().multiplyScalar(.45*(1+fbm(v.x,v.y,4)*.35));
    pos2.setXYZ(i,v.x,v.y,v.z);
  }
  pos2.needsUpdate=true; geo.computeVertexNormals();
  group.add(new THREE.Mesh(geo, mkPlanetMat(TEXTURES.asteroid(),'#888888',5)));
  // Asteroid belt particles
  const bGeo=new THREE.BufferGeometry();
  const cnt=600;const bPos=new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){
    const angle=Math.random()*Math.PI*2;
    const r=4+Math.random()*5;const tilt=(Math.random()-.5)*1.5;
    bPos[i*3]=Math.cos(angle)*r;bPos[i*3+1]=tilt;bPos[i*3+2]=Math.sin(angle)*r;
  }
  bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
  group.add(new THREE.Points(bGeo,new THREE.PointsMaterial({color:0x887766,size:.12,sizeAttenuation:true})));
}
function buildComet(group){

  const geo=new THREE.SphereGeometry(.6,32,16);
  const pos2=geo.attributes.position;
  for(let i=0;i<pos2.count;i++){
    const v=new THREE.Vector3().fromBufferAttribute(pos2,i);
    v.normalize().multiplyScalar(.6+fbm(v.x*2,v.y*2,3)*.25);
    pos2.setXYZ(i,v.x,v.y,v.z);
  }
  pos2.needsUpdate=true; geo.computeVertexNormals();
  group.add(new THREE.Mesh(geo, mkPlanetMat(TEXTURES.comet(),'#aaaaaa',5)));
  // Coma
  const comaGeo=new THREE.SphereGeometry(1.4,32,16);
  const comaMat=new THREE.MeshBasicMaterial({color:0x88aacc,transparent:true,opacity:.08,side:THREE.BackSide});
  group.add(new THREE.Mesh(comaGeo,comaMat));
  // Tail particles
  const tGeo=new THREE.BufferGeometry();
  const cnt=800;const tPos=new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){
    const t=Math.random();
    tPos[i*3]=-(t*8+.6)+(Math.random()-.5)*t*2;
    tPos[i*3+1]=(Math.random()-.5)*t*1.5;
    tPos[i*3+2]=(Math.random()-.5)*t*1;
  }
  tGeo.setAttribute('position',new THREE.BufferAttribute(tPos,3));
  const tMat=new THREE.PointsMaterial({color:0xaaccff,size:.06,transparent:true,opacity:.55,sizeAttenuation:true});
  group.add(new THREE.Points(tGeo,tMat));
  // Ion tail (blueish)
  const itGeo=new THREE.BufferGeometry();
  const itPos=new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){
    const t=Math.random()*0.7;
    itPos[i*3]=-(t*12+.5)+(Math.random()-.5)*t*.5;
    itPos[i*3+1]=(Math.random()-.5)*t*.3;
    itPos[i*3+2]=(Math.random()-.5)*t*.3;

  itGeo.setAttribute('position',new THREE.BufferAttribute(itPos,3));
  group.add(new THREE.Points(itGeo,new THREE.PointsMaterial({color:0x4488ff,size:.04,transparent:true,opacity:.35})));
}

function buildBlackHole(group){
  // Event horizon
  const geo=new THREE.SphereGeometry(2.2,64,32);
  const mat=new THREE.MeshBasicMaterial({color:0x000000});
  group.add(new THREE.Mesh(geo,mat));
  // Accretion disk
  const diskColors=[
    {ir:2.4,or:3.2,col:'rgba(255,220,80,0.85)'},
    {ir:3.2,or:4.2,col:'rgba(255,120,40,0.6)'},
    {ir:4.2,or:5.5,col:'rgba(180,50,200,0.45)'},
    {ir:5.5,or:7.0,col:'rgba(80,40,180,0.3)'},
    {ir:7.0,or:9.0,col:'rgba(40,20,100,0.15)'},
  ];
  diskColors.forEach(({ir,or,col},i)=>{
    const tex=mkTex(1024,4,(ctx,w,h)=>{
      const g=ctx.createLinearGradient(0,0,w,0);
      g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.1,col);g.addColorStop(.5,col);g.addColorStop(.9,col);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
      // Hot spots
      for(let j=0;j<20;j++){
        const x=Math.random()*w,bri=Math.random()>.5;
        ctx.fillStyle=bri?'rgba(255,255,200,0.2)':'rgba(0,0,0,0.1)';
        ctx.fillRect(x,0,3,h);
      }
    });
    const ring=mkRing(ir,or,tex,{x:-Math.PI/2});
    ring.userData={rotY:0.003*(i%2===0?1:-1)*(1-i*.15), isBHRing:true};
    group.add(ring);
  });
  // Gravitational lensing halo
  const lensGeo=new THREE.SphereGeometry(2.4,32,16);
  const lensMat=new THREE.ShaderMaterial({
    uniforms:{uColor:{value:new THREE.Color('#9922ff')},uIntensity:{value:1.2}},
    vertexShader:atmVert,fragmentShader:atmFrag,
    transparent:true,side:THREE.BackSide
  });
  group.add(new THREE.Mesh(lensGeo,lensMat));
  // Jet particles (relativistic jets)
  for(let jet=0;jet<2;jet++){
    const jGeo=new THREE.BufferGeometry();
    const cnt=400;const jPos=new Float32Array(cnt*3);
    const sign=jet===0?1:-1;
    for(let i=0;i<cnt;i++){
      const t=Math.random();
      jPos[i*3]=(Math.random()-.5)*t*0.5;
      jPos[i*3+1]=sign*(2.5+t*8);
      jPos[i*3+2]=(Math.random()-.5)*t*0.5;
    }
    jGeo.setAttribute('position',new THREE.BufferAttribute(jPos,3));
    group.add(new THREE.Points(jGeo,new THREE.PointsMaterial({color:0x4488ff,size:.04,transparent:true,opacity:.5,sizeAttenuation:true})));
  }
}

function buildGalaxy(group){
  // Spiral galaxy
  const gGeo=new THREE.BufferGeometry();
  const cnt=20000;const gPos=new Float32Array(cnt*3);const gCol=new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){
    const arm=Math.floor(Math.random()*4);
    const t=Math.pow(Math.random(),0.5);
    const angle=arm/4*Math.PI*2+t*5;
    const r=t*4.5;
    const spread=.08+t*.3;
    gPos[i*3]=(Math.cos(angle)*r+(Math.random()-.5)*spread)*1.2;

    gPos[i*3+2]=(Math.sin(angle)*r+(Math.random()-.5)*spread)*0.55;

    const ct=t;
    gCol[i*3]=lerp(.9,0.4,ct);gCol[i*3+1]=lerp(.85,0.5,ct);gCol[i*3+2]=lerp(1,0.7,ct);
  }
  gGeo.setAttribute('position',new THREE.BufferAttribute(gPos,3));
  gGeo.setAttribute('color',new THREE.BufferAttribute(gCol,3));
  group.add(new THREE.Points(gGeo,new THREE.PointsMaterial({vertexColors:true,size:.018,transparent:true,opacity:.85,sizeAttenuation:true})));

  const cGeo=new THREE.SphereGeometry(.3,32,16);

// ── SPEED ANIMATION ───────────────────────────────────
let spdCurrent=0, spdRaf=null;
function animSpd(from, to, duration, onDone){
  if(spdRaf) cancelAnimationFrame(spdRaf);
  const t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/duration, 1);
    // ease-in-out cubic
    const e=p<0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    spdCurrent=from+(to-from)*e;
    // Format nicely
    if(spdCurrent>=100000)      spdEl.textContent=Math.round(spdCurrent).toLocaleString('pt-BR');
    else if(spdCurrent>=1000)   spdEl.textContent=Math.round(spdCurrent).toLocaleString('pt-BR');
    else if(spdCurrent>=10)     spdEl.textContent=spdCurrent.toFixed(0);
    else                        spdEl.textContent=spdCurrent.toFixed(2);
    if(p<1){ spdRaf=requestAnimationFrame(step); }
    else{ spdCurrent=to; if(onDone) onDone(); }
  }
  spdRaf=requestAnimationFrame(step);
}

function makeSpeedLines(){
  slEl.innerHTML='';
  for(let i=0;i<40;i++){
    const sl2=document.createElement('div');
    sl2.className='sl';
    const len=80+Math.random()*200;
    sl2.style.cssText=`width:${len}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
      animation-delay:${Math.random()*.3}s;opacity:${.3+Math.random()*.7};
      animation-duration:${.3+Math.random()*.2}s`;
    slEl.appendChild(sl2);
  }
}

function goTo(idx){
  if(transitioning||idx===curIdx||idx<0||idx>=DESTS.length) return;
  transitioning=true;
  panel.classList.add('off');

  makeSpeedLines();
  slEl.classList.add('on');
  warpEl.classList.add('on');

  // Phase 1: acelera de 0 até 299.792 km/s em 600ms
  animSpd(0, 299792, 600, ()=>{
    // Phase 2: desacelera até 0 em 700ms
    animSpd(299792, 0, 700, ()=>{
      transitioning=false;
      panel.classList.remove('off');
    });
  });

  setTimeout(()=>{
    warpEl.classList.remove('on');
    curIdx=idx;
    buildScene(idx);
    setUI(idx);
  },220);
  setTimeout(()=>slEl.classList.remove('on'),500);
}

// ── RENDER LOOP ───────────────────────────────────────
let t=0, lastT=0;
function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-lastT)/1000,.05); lastT=now; t+=dt;
  uTime=t;

  // Update shader time uniforms
  shaderUniforms.forEach(u=>{ if(u.uTime) u.uTime.value=t; });

  // Scale in
  if(currentGroup){
    if(introScale<scaleTarget){
      introScale=Math.min(scaleTarget, introScale+dt*2.5);
      const s=smoothstep(introScale/scaleTarget)*scaleTarget;
      currentGroup.scale.set(s,s,s);
    }

    // Auto rotate planet
    const d=DESTS[curIdx];
    currentGroup.rotation.y+=d.ry||.002;

    // Orbital mechanics
    orbits.forEach(obj=>{
      const {orbitR,orbitSpeed,incline}=obj.userData;
      obj.userData.orbitAngle=(obj.userData.orbitAngle||0)+orbitSpeed;
      obj.position.x=Math.cos(obj.userData.orbitAngle)*orbitR;
      obj.position.z=Math.sin(obj.userData.orbitAngle)*orbitR;
      obj.position.y=Math.sin(obj.userData.orbitAngle*0.7)*(incline||0)*orbitR;
      obj.rotation.y+=.015;
    });

    // Rotate cloud layers and other animated objects
    currentGroup.traverse(obj=>{
      if(obj.userData.isSaturnRing || obj.userData.isUranusRing) return; // never rotate rings
      if(obj.userData.rotY) obj.rotation.y+=obj.userData.rotY;
      if(obj.userData.rotSelf){obj.rotation.z+=obj.userData.rotSpeed||.02;}
      if(obj.userData.isGeyser){
        const p=obj.geometry.attributes.position;
        for(let i=0;i<p.count;i++){
          p.array[i*3+1]-=.01;
          if(p.array[i*3+1]<-3){p.array[i*3+1]=-.38;}
        }
        p.needsUpdate=true;
      }
      // Animate accretion disk rings (only for black hole - tagged with rotY)
      if(obj.userData.isBHRing) obj.rotation.z+=obj.userData.rotY;
    });

    // Planet gentle bob
    currentGroup.position.y=Math.sin(t*.4)*.06;
  }

  // Camera cinematic pan
  camPanAngle+=.004;
  CAM.position.x=Math.sin(camPanAngle)*.8;
  CAM.position.y=camY+Math.sin(camPanAngle*.6)*.3;
  CAM.position.z=camTargetZ;
  CAM.lookAt(0,Math.sin(t*.3)*.08,0);

  // Star slow rotation
  STARS.rotation.y+=.00004;
  STARS.rotation.x+=.00002;

  // Dir light position follows slightly
  dirLight.position.x=50+Math.sin(t*.1)*10;

  R.render(S,CAM);
}
requestAnimationFrame(tick);

// ── INPUT ─────────────────────────────────────────────
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=tx-e.changedTouches[0].clientX,dy=ty-e.changedTouches[0].clientY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){dx>0?nav(1):nav(-1);}
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='d')nav(1);
  if(e.key==='ArrowLeft'||e.key==='a')nav(-1);
});
let wl=false;
document.addEventListener('wheel',e=>{
  if(wl)return;
  if(e.deltaX>30||e.deltaY>30)nav(1);
  else if(e.deltaX<-30||e.deltaY<-30)nav(-1);
  wl=true;setTimeout(()=>wl=false,900);
},{passive:true});
</script>
